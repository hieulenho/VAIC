function b64d(s){s=String(s).replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';
 return decodeURIComponent(Array.prototype.map.call(atob(s),function(c){
   return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));}
function tag(t){var e=document.getElementById('swtag');e.textContent=t;e.className='on';
 setTimeout(function(){e.className='';},3200);}

var qs=new URLSearchParams(location.search), app=document.getElementById('app'), speaking=false;
function speak(text,audioUrl){
  if(speaking)return; var b=document.getElementById('spk');
  if(b)b.classList.add('on'); speaking=true;
  var done=function(){speaking=false; if(b)b.classList.remove('on');};
  if(audioUrl){var a=new Audio(audioUrl);a.onended=done;a.onerror=function(){speak2(text,done);};a.play().catch(function(){speak2(text,done);});return;}
  speak2(text,done);
}
function speak2(text,done){
  if(!window.speechSynthesis){done();return;}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text);u.lang='vi-VN';u.rate=.8;u.onend=done;u.onerror=done;
  window.speechSynthesis.speak(u);
}
function renderAlert(p){
  var lv=p.lv||'CRITICAL', sz=p.sz||[null,null];
  document.title=p.t||'Cảnh báo';
  document.querySelector('meta[name=theme-color]').setAttribute('content', lv==='CRITICAL'?'#D32F2F':'#F57C00');
  var seq=(ACT[p.rt]||ACT.flood);
  var picto='<div class="pgrid">';
  seq.forEach(function(s,i){
    picto+='<div class="pcell">'+(s[1]?pcNo(s[0]):pc(s[0]))+'</div>';
    if(i<seq.length-1)picto+='<div class="parrow"><svg viewBox="0 0 26 26"><path d="M2 13h16M13 6l7 7-7 7" stroke="#9AA5B1" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
  });
  picto+='</div>';
  var html='<div class="alert '+lv+'">'
   +'<div class="ico">'+svg(p.rt,'pulse')+'</div>'
   +'<h1>'+esc(p.t)+'</h1><div class="desc">'+esc(p.d)+'</div>'
   +'<div class="picto">'+picto+'<div class="act">'+esc(p.a)+'</div></div>'
   +'<div class="row"><button class="spk" id="spk" aria-label="Nghe">'+svg('speaker')+'</button>'
   +'<div class="langs"><button class="lang" data-l="vi">Tiếng Việt</button>'
   +'<button class="lang sel" data-l="hmong">Mông</button><button class="lang" data-l="thai">Thái</button></div></div>'
   +'<div class="map"><svg viewBox="0 0 400 220" preserveAspectRatio="xMidYMid slice">'
   +'<rect width="400" height="220" fill="rgba(0,0,0,.12)"/>'
   +'<g fill="none" stroke="rgba(255,255,255,.22)" stroke-width="2">'
   +'<ellipse cx="300" cy="66" rx="95" ry="50"/><ellipse cx="300" cy="66" rx="70" ry="36"/>'
   +'<ellipse cx="300" cy="66" rx="45" ry="23"/><ellipse cx="300" cy="66" rx="22" ry="11"/>'
   +'<ellipse cx="66" cy="182" rx="78" ry="40"/></g>'
   +'<path d="M8 192 Q120 202 200 164 T392 144" stroke="rgba(255,255,255,.3)" stroke-width="9" fill="none"/>'
   +'<path d="M92 170 Q148 144 208 126 T288 78" stroke="#fff" stroke-width="4" fill="none" stroke-dasharray="10 8"/>'
   +'<circle cx="92" cy="170" r="15" fill="rgba(255,255,255,.28)"><animate attributeName="r" values="11;21;11" dur="1.8s" repeatCount="indefinite"/></circle>'
   +'<circle cx="92" cy="170" r="7" fill="#fff"/>'
   +'<path d="M288 78 l0 -28 21 8 -21 8" fill="#4CAF50"/><circle cx="288" cy="78" r="8" fill="#4CAF50"/>'
   +'<text x="200" y="24" fill="#fff" font-size="14" font-weight="700" text-anchor="middle" id="dist">'+esc(p.szn||'')+'</text>'
   +'</svg></div>'
   +'<div class="badge">'+svg('plane')+' Xem được khi không có mạng</div>'
   +'<div class="ts">Phát lúc '+new Date((p.ts||0)*1000).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})
   +' · '+esc(p.szn||'')+'</div></div>';
  app.innerHTML=html;
  var lang='hmong';
  var AUDIO={hmong:'',thai:''};  /* <-- URL mp3 thu sẵn; để trống -> đọc tiếng Việt bằng giọng máy */
  document.querySelectorAll('.lang').forEach(function(b){b.onclick=function(){
    document.querySelectorAll('.lang').forEach(function(x){x.classList.remove('sel');});
    b.classList.add('sel');lang=b.dataset.l;speak(script,AUDIO[lang]||'');};});
  var script=(p.t||'')+'. '+(p.d||'')+'. '+(p.a||'');
  document.getElementById('spk').onclick=function(){speak(script,AUDIO[lang]||'');};
  setTimeout(function(){speak(script,AUDIO[lang]||'');},600);   /* thử tự đọc; bị chặn thì đã có nút loa to */
  if(navigator.geolocation && sz[0]!=null){
    navigator.geolocation.getCurrentPosition(function(pos){
      var R=6371000,t=Math.PI/180;
      var dLa=(sz[0]-pos.coords.latitude)*t,dLo=(sz[1]-pos.coords.longitude)*t;
      var aa=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(pos.coords.latitude*t)*Math.cos(sz[0]*t)*Math.sin(dLo/2)*Math.sin(dLo/2);
      var d=Math.round(2*R*Math.atan2(Math.sqrt(aa),Math.sqrt(1-aa)));
      var el=document.getElementById('dist');
      if(el)el.textContent=(d>=1000?(d/1000).toFixed(1)+' km':d+' m')+' → '+(p.szn||'');
    },function(){},{timeout:4000});
  }
}

/* ===== Icon thời tiết NHIỀU MÀU (port từ mẫu React, dựng bằng JS thuần) ===== */
function raySet(cx,cy,angles,r1,r2,w){var s='';angles.forEach(function(a){var rad=a*Math.PI/180;
  s+='<line x1="'+(cx+r1*Math.cos(rad)).toFixed(1)+'" y1="'+(cy+r1*Math.sin(rad)).toFixed(1)
   +'" x2="'+(cx+r2*Math.cos(rad)).toFixed(1)+'" y2="'+(cy+r2*Math.sin(rad)).toFixed(1)
   +'" stroke="#F59E0B" stroke-width="'+w+'" stroke-linecap="round"/>';});return s;}
function drops(pts,color,w,len){var s='';pts.forEach(function(p){
  s+='<line x1="'+p[0]+'" y1="'+p[1]+'" x2="'+(p[0]-(len>10?5:4))+'" y2="'+(p[1]+len)+'" stroke="'+color+'" stroke-width="'+w+'" stroke-linecap="round"/>';});return s;}
function weatherColorSVG(code,size){
  var s='<svg width="'+size+'" height="'+size+'" viewBox="0 0 80 80" fill="none">';
  if(code===0){ s+='<circle cx="40" cy="40" r="18" fill="#FCD34D"/>'+raySet(40,40,[0,45,90,135,180,225,270,315],24,32,4);
  }else if(code<=2){ s+='<circle cx="30" cy="34" r="13" fill="#FCD34D"/>'+raySet(30,34,[315,0,45,270,225],18,24,3.5)
    +'<ellipse cx="46" cy="50" rx="16" ry="10" fill="#94A3B8"/><ellipse cx="36" cy="52" rx="12" ry="9" fill="#94A3B8"/><ellipse cx="54" cy="53" rx="10" ry="8" fill="#CBD5E1"/>';
  }else if(code<=3){ s+='<ellipse cx="42" cy="40" rx="20" ry="13" fill="#94A3B8"/><ellipse cx="28" cy="44" rx="15" ry="11" fill="#94A3B8"/><ellipse cx="54" cy="45" rx="13" ry="10" fill="#CBD5E1"/><ellipse cx="40" cy="48" rx="22" ry="10" fill="#CBD5E1"/>';
  }else if(code<=48){ s+='<ellipse cx="40" cy="28" rx="22" ry="12" fill="#CBD5E1"/>';
    [38,48,58].forEach(function(y,i){s+='<rect x="14" y="'+y+'" width="'+(46-i*6)+'" height="5" rx="2.5" fill="#94A3B8" opacity="0.7"/>';});
  }else if(code<=57){ s+='<ellipse cx="42" cy="30" rx="20" ry="13" fill="#64748B"/><ellipse cx="28" cy="34" rx="15" ry="11" fill="#475569"/><ellipse cx="54" cy="35" rx="13" ry="10" fill="#64748B"/>'
    +drops([[28,54],[40,58],[52,54],[34,62],[46,62]],'#93C5FD',2.5,9);
  }else if(code<=67){ s+='<ellipse cx="42" cy="26" rx="20" ry="13" fill="#475569"/><ellipse cx="27" cy="31" rx="15" ry="11" fill="#334155"/><ellipse cx="55" cy="32" rx="13" ry="10" fill="#475569"/>'
    +drops([[24,50],[34,54],[44,50],[54,54],[29,62],[39,58],[49,62],[59,58]],'#3B82F6',2.8,11);
  }else if(code<=82){ s+='<ellipse cx="40" cy="24" rx="18" ry="11" fill="#475569"/><ellipse cx="27" cy="29" rx="14" ry="10" fill="#334155"/><ellipse cx="53" cy="29" rx="12" ry="9" fill="#475569"/>'
    +drops([[22,48],[34,52],[46,48],[58,52],[28,60],[40,56],[52,60]],'#60A5FA',3,12);
  }else if(code>=71&&code<=77){ s+='<ellipse cx="40" cy="30" rx="20" ry="12" fill="#CBD5E1"/><ellipse cx="27" cy="34" rx="14" ry="10" fill="#E2E8F0"/>';
    [[28,52],[40,56],[52,52],[34,62],[46,62]].forEach(function(p){s+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.6" fill="#BAE6FD"/>';});
  }else{ s+='<ellipse cx="40" cy="22" rx="20" ry="12" fill="#1E293B"/><ellipse cx="26" cy="27" rx="15" ry="10" fill="#0F172A"/><ellipse cx="54" cy="27" rx="13" ry="9" fill="#1E293B"/>'
    +drops([[24,44],[34,48],[54,44],[64,48]],'#93C5FD',2.5,12)
    +'<polygon points="43,40 36,55 41,55 38,70 52,50 45,50 50,40" fill="#FDE047"/>';
  }
  return s+'</svg>';
}
/* Icon cảnh báo THEO HÌNH DẠNG — vẫn phân biệt được khi in đen trắng / người mù màu */
function alertShapeSVG(level,size,color){
  var s='<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none">';
  if(level==='SAFE') s+='<circle cx="12" cy="12" r="10" fill="'+color+'"/><polyline points="7,12 10.5,15.5 17,9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
  else if(level==='ADVISORY') s+='<polygon points="12,3 22,21 2,21" fill="'+color+'"/><text x="12" y="19" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">!</text>';
  else if(level==='WARNING') s+='<polygon points="9,2 15,2 22,9 22,15 15,22 9,22 2,15 2,9" fill="'+color+'"/><text x="12" y="17" text-anchor="middle" font-size="11" font-weight="900" fill="#fff">!</text>';
  else s+='<polygon points="12,1 14.5,9.5 23,9.5 16,14.5 18.5,23 12,18 5.5,23 8,14.5 1,9.5 9.5,9.5" fill="'+color+'"/><line x1="9" y1="9" x2="15" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="9" x2="9" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>';
  return s+'</svg>';
}
var LVSOLID={SAFE:'#16a34a',ADVISORY:'#d97706',WARNING:'#ea580c',CRITICAL:'#dc2626'};
var LVCHIP={SAFE:'#dcfce7',ADVISORY:'#fef9c3',WARNING:'#ffedd5',CRITICAL:'#fee2e2'};
var LVCHIPTX={SAFE:'#14532d',ADVISORY:'#78350f',WARNING:'#7c2d12',CRITICAL:'#7f1d1d'};
var HEROLINE={SAFE:'HÔM NAY AN TOÀN',ADVISORY:'HÔM NAY CẦN CHÚ Ý',WARNING:'HÔM NAY CÓ CẢNH BÁO',CRITICAL:'HÔM NAY NGUY HIỂM'};

function renderForecast(data,pick){
  if(!data.locations||!data.locations.length){app.innerHTML='<div class="load">'+esc(data.message||'Chưa có dữ liệu.')+'</div>';return;}
  var i=0; if(pick){var k=-1;data.locations.forEach(function(l,n){if(l.id===pick)k=n;});if(k>=0)i=k;}
  var order=['SAFE','ADVISORY','WARNING','CRITICAL'];
  function draw(){
    var L=data.locations[i],d=L.daily||{},lv=L.alert_level||'SAFE';
    var t0=(d.t_max||[])[0],wc=(d.weather_code||[])[0];
    var solid=LVSOLID[lv];
    var when=data.generated_at?new Date(data.generated_at).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}):'--:--';
    var m=(L.metrics||{}), cov=(data.coverage||{});

    var h='<div class="fcw">';
    // selector xã — chấm màu theo mức + tên
    h+='<div class="selwrap"><div class="seg2">';
    data.locations.forEach(function(l,k){
      var lc=LVSOLID[l.alert_level||'SAFE'];
      h+='<button class="'+(k===i?'sel':'')+'" data-k="'+k+'">'
        +'<span class="dot2" style="background:'+lc+(k===i?';box-shadow:0 0 0 3px '+lc+'33':'')+'"></span>'
        +'<span class="snm">'+esc(String(l.name).replace(/^(Xã|Phường) /,'').replace(/\s*\(.*\)$/,''))+'</span></button>';
    });
    h+='</div></div>';
    // HERO
    h+='<div class="hero2" style="background:'+solid+'">'
      +'<div class="halo halo1"></div><div class="halo halo2"></div>'
      +'<div class="hicon">'+weatherColorSVG(wc,132)+'</div>'
      +'<div class="hline">'+HEROLINE[lv]+'</div>'
      +'<div class="htemp"><span class="hnum">'+(t0!=null?Math.round(t0):'--')+'</span><span class="hdeg">°C</span></div>'
      +'</div>';
    // thang 4 cấp
    h+='<div class="scale2">';
    order.forEach(function(x){
      var on=x===lv;
      h+='<div class="lv2'+(on?' on':'')+'" style="'+(on?'background:'+LVSOLID[x]+';box-shadow:0 0 0 3px #fff,0 4px 20px '+LVSOLID[x]+';border-color:'+LVSOLID[x]:'background:'+LVCHIP[x])+'">'
        +alertShapeSVG(x,on?26:22,on?'#fff':LVSOLID[x])
        +'<span style="color:'+(on?'#fff':LVCHIPTX[x])+'">'+({SAFE:'AN TOÀN',ADVISORY:'CHÚ Ý',WARNING:'CẢNH BÁO',CRITICAL:'NGUY HIỂM'}[x])+'</span></div>';
    });
    h+='</div>';
    // 7 ngày
    h+='<div class="days2wrap"><div class="days2">';
    (d.time||[]).slice(0,7).forEach(function(dt,k){
      var mx=(d.t_max||[])[k],mn=(d.t_min||[])[k],c=(d.weather_code||[])[k],ps=(d.precip_sum||[])[k]||0;
      var th=((data.diagnostics||{}).thresholds_by_location||{})[L.id]||{};
      var r='SAFE';
      if(ps>(th.rain_critical_mm||50))r='CRITICAL';else if(ps>(th.rain_warning_mm||30))r='WARNING';
      else if(ps>(th.rain_advisory_mm||15))r='ADVISORY';
      if(mn!=null&&mn<4)r=(mn<0?'CRITICAL':'WARNING');
      var today=k===0;
      h+='<div class="day2" style="'+(today?'background:'+LVCHIP[r]+';border-color:'+LVSOLID[r]+'44':'background:#f8fafc;border-color:#e2e8f0')+';border-top:5px solid '+LVSOLID[r]+'">'
        +'<span class="d2n" style="color:'+(today?LVCHIPTX[r]:'#475569')+'">'+(today?'Hôm nay':['CN','T2','T3','T4','T5','T6','T7'][new Date(dt).getDay()])+'</span>'
        +weatherColorSVG(c,40)
        +'<span class="d2t">'+(mx!=null?Math.round(mx):'--')+'°<small>'+(mn!=null?Math.round(mn):'--')+'°</small></span></div>';
    });
    h+='</div></div>';
    // footer
    h+='<div class="foot2">'
      +'<div class="frow">'+svg('plane','')+' Cập nhật lúc '+when+', hôm nay'
      +(m.n_points>1?' · '+m.n_points+' điểm đo':'')+'</div>'
      +'<div class="fchip"><svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#16a34a"/><polyline points="7,12 10.5,15.5 17,9" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +(data.source_agreement?'Đối chiếu 2 nguồn dữ liệu':(cov.communes?cov.communes+' xã toàn tỉnh':'Đang theo dõi'))+'</div>'
      +'</div></div>';
    app.innerHTML=h;
    document.querySelectorAll('.seg2 button').forEach(function(b){b.onclick=function(){i=+b.dataset.k;draw();};});
  }
  draw();
}
/* Service Worker: cache vỏ trang -> lần sau mở link vẫn render KHI MẤT MẠNG */
try {
  if ('serviceWorker' in navigator && navigator.serviceWorker) {
    navigator.serviceWorker.register('./aether-sw',{scope:'./'})
      .then(function(){tag('✓ Đã lưu để xem offline');})
      .catch(function(e){/* SW không bắt buộc */});
  }
} catch(e) { /* SW bị sandbox chặn khi xem qua n8n webhook — bỏ qua, trang vẫn chạy bình thường */ }
(function(){
  var raw=qs.get('data');
  if(raw){try{renderAlert(JSON.parse(b64d(raw)));return;}catch(e){app.innerHTML='<div class="load">Link cảnh báo không hợp lệ.</div>';return;}}
  fetch('./aether-forecast',{cache:'no-store'}).then(function(r){return r.json();})
    .then(function(d){renderForecast(d,qs.get('x'));})
    .catch(function(){app.innerHTML='<div class="load">Không có mạng và chưa có dữ liệu đã lưu.</div>';});
})();
</script></body></html>
